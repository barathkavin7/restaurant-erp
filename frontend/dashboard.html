<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | RestaurantERP Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside class="sidebar glass">
        <a class="brand" href="/">
          <span class="brand-mark">RP</span>
          <span>RestaurantERP Pro</span>
        </a>
        <div class="user-pill">
          <strong id="sidebarName">Loading</strong>
          <span id="sidebarRole">Role</span>
        </div>
        <nav id="roleNav" class="side-nav"></nav>
      </aside>

      <main class="dashboard-main">
        <header class="dashboard-top">
          <div>
            <p class="eyebrow" id="dashboardEyebrow">Dashboard</p>
            <h1 id="dashboardTitle">RestaurantERP Pro</h1>
          </div>
          <div class="top-actions">
            <span id="socketStatus" class="status-dot">Connecting</span>
            <button id="logoutBtn" class="btn btn-ghost" type="button">Logout</button>
          </div>
        </header>

        <section id="dashboardContent" class="dashboard-content"></section>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
